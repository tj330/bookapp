apiVersion: apps/v1
kind: Deployment
metadata:
  name: book
spec:
  replicas: 2
  selector:
    matchLabels:
      app: book
  template:
    metadata:
      labels:
        app: book
    spec:
      containers:
        - name: book
          image: book:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
